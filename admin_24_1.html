    <!-- ================= JS 逻辑区域 ================= -->
    <script>
        // 1. 初始化变量
        let supabaseClient;
        let isLoggedIn = false;
        const ALL_SLOTS = [];
        for (let h = 11; h < 21; h++) {
            ALL_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
            ALL_SLOTS.push(`${String(h).padStart(2,'0')}:30`);
        }
        // 生成30分钟时间格
        const TIME_SLOTS = [];
        for (let h = 11; h < 21; h++) {
            TIME_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
            TIME_SLOTS.push(`${String(h).padStart(2,'0')}:30`);
        }
        // 工具：获取某格结束时间
        function slotEndTime(slot) {
            const [h,m] = slot.split(':').map(Number);
            const total = h*60+m+30;
            return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
        }

        // 将 '11:00+11:30' 转为 '11:00-12:00'，单格转为 '11:00-11:30'
        function formatTimeSlot(timeSlot) {
            const slots = timeSlot.split('+').map(s => s.trim());
            const start = slots[0];
            const end = slotEndTime(slots[slots.length - 1]);
            return `${start}-${end}`;
        }

        // 页面加载完成后运行
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof CONFIG === 'undefined') {
                alert("错误：找不到 config.js 文件！请确保三个文件在同一个文件夹里。");
                return;
            }
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_SERVICE_KEY);
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('boardDateSelect').value = today;
            if (localStorage.getItem('admin_logged_in') === 'true') {
                showAdminPage();
            }
        });

        // ================= 登录/退出逻辑 =================
        function adminLogin() {
            const pwd = document.getElementById('adminPwdInput').value;
            if (pwd === CONFIG.ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                alert('登录成功！');
                showAdminPage();
            } else {
                alert('密码错误！');
            }
        }

        function adminLogout() {
            localStorage.removeItem('admin_logged_in');
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';

        // ================= 看板逻辑 =================
        async function loadBoard() {
            const selectedDate = document.getElementById('boardDateSelect').value;
            if (!selectedDate) return;
            const container = document.getElementById('timeGridContainer');
            container.innerHTML = '<p>加载中...</p>';
            const { data, error } = await supabaseClient
                .from('appointments')
                .select(`
                    id, time_slot, status, user_name, user_phone, user_remark, package_type, session_index,
                    users ( id, name, phone, package_type, remaining_sessions, total_sessions, admin_remark )
                `)
                .eq('appointment_date', selectedDate);
            if (error) { container.innerHTML = '<p>加载失败</p>'; console.error(error); return; }
            container.innerHTML = '';
            const now = new Date();
            const selectedDateStr = document.getElementById('boardDateSelect').value;
            const { data: cfgData } = await supabaseClient.from('slot_config').select('slot, max_capacity');
            const capMap = {};
            if (cfgData) cfgData.forEach(c => { capMap[c.slot] = c.max_capacity; });
            const slotAptList = {};
            const toAutoComplete = [];
            data.forEach(apt => {
                if (apt.status === 'cancelled') return;
                const aptSlots = apt.time_slot.split('+').map(s=>s.trim());
                const endSlot = aptSlots[aptSlots.length-1];
                const endTime = slotEndTime(endSlot);
                const slotEnd = new Date(`${selectedDateStr} ${endTime}:00`);
                if (apt.status === 'pending' && now >= slotEnd) {
                    toAutoComplete.push(apt.id);
                    apt.status = 'completed';
                }
                aptSlots.forEach(s => {
                    const k = s.trim();
                    if (!slotAptList[k]) slotAptList[k] = [];
                    slotAptList[k].push(apt);
                });
            });
            if (toAutoComplete.length > 0) {
                supabaseClient.from('appointments').update({ status: 'completed' })
                    .in('id', toAutoComplete).then(({error}) => {
                        if (error) console.error('自动完成失败:', error);
                    });
            }
            const renderedApts = new Set();
            TIME_SLOTS.forEach(slot => {
                const apts = slotAptList[slot] || [];
                const cap = capMap[slot] || 1;
                const isFull = apts.length >= cap;
                const div = document.createElement('div');
                div.className = 'time-slot ' + (apts.length > 0 ? 'booked' : 'empty');
                let cellContent = `<div class="slot-time" style="font-size:13px;">${slot}-${slotEndTime(slot)}</div>`;
                if (apts.length > 0) {
                    apts.forEach(apt => {
                        const aptSlots = apt.time_slot.split('+').map(s=>s.trim());
                        const endSlot = aptSlots[aptSlots.length-1];
                        const endTime = slotEndTime(endSlot);
                        const slotStart = new Date(`${selectedDateStr} ${aptSlots[0]}:00`);
                        const slotEnd = new Date(`${selectedDateStr} ${endTime}:00`);
                        const isOngoing = apt.status === 'pending' && now >= slotStart && now < slotEnd;
                        const isEnded = now >= slotEnd;
                        const statusLabel = apt.status === 'completed' ? '✅ 已完成' : (isOngoing ? '🟢 进行中' : '已约');
                        cellContent += `<div class="slot-status booked" style="font-size:11px;">${statusLabel}</div>`;
                        if (!renderedApts.has(apt.id)) {
                            renderedApts.add(apt.id);
                            const total = apt.users ? apt.users.total_sessions || 0 : 0;
                            const remain = apt.users ? apt.users.remaining_sessions || 0 : 0;
                            const sessionNum = total - remain + 1;
                            const courseTag = apt.session_index || `${apt.users?.package_type||''}${sessionNum}`;
                            const isManual = apt.package_type === 'MANUAL';
                            const displayName = isManual ? (apt.user_name || '-') : (apt.users?.name || apt.user_name || '-');
                            const displayPhone = isManual ? (apt.user_phone || '-') : (apt.users?.phone || apt.user_phone || '-');
                            const adminRemark = isManual ? '' : (apt.users?.admin_remark || '');
                            cellContent += `<div class="user-info" style="font-size:12px;border-top:1px solid #f0f0f0;padding-top:4px;margin-top:4px;">
                                <b>${displayName}${adminRemark ? ' <span style="color:#fa8c16;font-weight:normal;">['+adminRemark+']</span>' : ''}</b><br>
                                📞 ${displayPhone}<br>
                                🏷️ ${courseTag} · ${aptSlots.length===1?'30分钟':'60分钟'}
                                ${apt.user_remark ? '<br>💬 ' + apt.user_remark : ''}
                            </div>`;
                            if (apt.status === 'pending') {
                                cellContent += `<div style="display:flex;gap:3px;margin-top:4px;">
                                    ${isEnded ? `<button onclick="markCompleted('${apt.id}')" style="flex:1;padding:3px 0;background:#52c41a;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">✔ 完成</button>` : ''}
                                    <button onclick="adminCancelAppointment('${apt.id}')" style="flex:1;padding:3px 0;background:#ff4d4f;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">✖ 取消</button>
                                </div>`;
                            }
                        } else {
                            const isManual = apt.package_type === 'MANUAL';
                            const displayName = isManual ? (apt.user_name || '-') : (apt.users?.name || apt.user_name || '-');
                            cellContent += `<div class="user-info" style="font-size:12px;border-top:1px solid #f0f0f0;padding-top:4px;margin-top:4px;color:#888;">
                                <b style="color:#555;">${displayName}</b>（续）
                            </div>`;
                        }
                    });
                }
                const slotEndDt = new Date(`${selectedDateStr} ${slotEndTime(slot)}:00`);
                const slotPast = now >= slotEndDt;
                if (!isFull && !slotPast) {
                    cellContent += `<button onclick="openManualBook('${slot}')" style="margin-top:6px;width:100%;padding:3px 0;background:#722ed1;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">✚ 手动占用</button>`;
                    if (apts.length === 0) {
                        cellContent = `<div class="slot-time" style="font-size:13px;">${slot}-${slotEndTime(slot)}</div><div class="slot-status">空闲</div>` + cellContent.slice(cellContent.indexOf('<button'));
                    }
                }
                div.innerHTML = cellContent;
                container.appendChild(div);
            });
        }

        // ================= 实时监听逻辑 =================
        function subscribeRealtime() {
            supabaseClient
                .channel('public:appointments')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'appointments' }, payload => {
                    console.log('收到数据变动，自动刷新');
                    loadBoard();
                    if (document.getElementById('tab-history').style.display !== 'none') loadHistory();
                })
                .subscribe();
        }

        // ================= 标记完成 =================
        async function markCompleted(aptId) {
            if (!confirm('确认标记该课程为已完成？')) return;
            try {
                const { error } = await supabaseClient.from('appointments').update({ status: 'completed' }).eq('id', aptId);
                if (error) throw error;
                alert('已标记为完成！');
                loadBoard();

        async function adminCancelAppointment(aptId) {
            if (!confirm('确认取消该预约？\n次数将自动返还给用户。')) return;
            try {
                const { data: apt, error: fetchErr } = await supabaseClient.from('appointments').select('user_id, session_index').eq('id', aptId).single();
                if (fetchErr) throw fetchErr;
                const { error: cancelErr } = await supabaseClient.from('appointments').update({ status: 'cancelled' }).eq('id', aptId);
                if (cancelErr) throw cancelErr;
                const { data: user, error: userFetchErr } = await supabaseClient.from('users').select('remaining_sessions, used_session_indices').eq('id', apt.user_id).single();
                if (userFetchErr) throw userFetchErr;
                const newRemaining = (user.remaining_sessions || 0) + 1;
                const newUsedIndices = (user.used_session_indices || []).filter(i => i !== apt.session_index);
                const { error: updateErr } = await supabaseClient.from('users').update({ remaining_sessions: newRemaining, used_session_indices: newUsedIndices }).eq('id', apt.user_id);
                if (updateErr) throw updateErr;
                alert('已取消，次数已返还给用户。');
                loadBoard();
            } catch (e) { alert('操作失败：' + e.message); }
        }

                    });

        // ================= 手动占用时段（代客预约）=================
        function openManualBook(slot) {
            const date = document.getElementById('boardDateSelect').value;
            const now = new Date();
            const slotEnd = new Date(`${date} ${slotEndTime(slot)}:00`);
            if (slotEnd <= now) { alert('该时段已过去，无法手动占用。'); return; }
            const name = prompt(`手动占用 ${date} ${slot}-${slotEndTime(slot)}\n客户姓名（可输入渠道说明，如"电话预约-张三"）：`);
            if (!name) return;
            const phone = prompt('客户手机号（可留空填000）：') || '000';
            const remark = prompt('备注（可选，如来源/特殊说明）：') || '';
            const durStr = prompt('占用时长？\n输入 1 = 30分钟（一格）\n输入 2 = 60分钟（两格）', '1');
            const dur = parseInt(durStr);
            if (!dur || (dur !== 1 && dur !== 2)) { alert('请输入 1 或 2'); return; }
            confirmManualBook(date, slot, name, phone, remark, dur);
        }

        async function confirmManualBook(date, slot, name, phone, remark, dur) {
            try {
                const nextSlot = ALL_SLOTS[ALL_SLOTS.indexOf(slot)+1];
                const finalSlots = dur === 2 && nextSlot ? [slot, nextSlot] : [slot];
                const timeSlotStr = finalSlots.join('+');
                const [aptRes, cfgRes] = await Promise.all([
                    supabaseClient.from('appointments').select('id, time_slot').eq('appointment_date', date).neq('status', 'cancelled'),
                    supabaseClient.from('slot_config').select('slot, max_capacity')
                ]);
                const slotCount = {};
                if (aptRes.data) aptRes.data.forEach(a => { a.time_slot.split('+').forEach(s => { const k = s.trim(); slotCount[k] = (slotCount[k] || 0) + 1; }); });
                const capMap = {};
                if (cfgRes.data) cfgRes.data.forEach(c => { capMap[c.slot] = c.max_capacity; });
                const conflict = finalSlots.find(s => (slotCount[s] || 0) >= (capMap[s] || 1));
                if (conflict) { alert(`时段 ${conflict} 预约已满（当前 ${slotCount[conflict]||0}/${capMap[conflict]||1} 人），无法占用。`); return; }
                const { error } = await supabaseClient.from('appointments').insert({
                    user_id: '00000000-0000-0000-0000-000000000000', user_name: name, user_phone: phone, appointment_date: date,
                    time_slot: timeSlotStr, status: 'pending', package_type: 'MANUAL', session_index: 'M1', user_remark: remark || '', need_info: true
                });
                if (error) throw error;
                alert('占用成功！'); loadBoard();
            } catch(e) { alert('占用失败：' + e.message); }
        }

        // ================= 门店设置 =================
        async function loadStoreSettings() {
            const { data } = await supabaseClient.from('store_info').select('*').eq('id',1).single();
            if (!data) return;
            document.getElementById('storeName').value = data.name || '';
            document.getElementById('storeAddress').value = data.address || '';
            document.getElementById('storePhone').value = data.phone || '';
            document.getElementById('storeHours').value = data.hours || '';
            document.getElementById('storeNotice').value = data.notice || '';
        }

        async function saveStoreInfo() {
            const payload = {
                name: document.getElementById('storeName').value.trim(),
                address: document.getElementById('storeAddress').value.trim(),
                phone: document.getElementById('storePhone').value.trim(),
                hours: document.getElementById('storeHours').value.trim(),
                notice: document.getElementById('storeNotice').value.trim()
            };
            const { error } = await supabaseClient.from('store_info').update(payload).eq('id', 1);
            if (error) { alert('保存失败：' + error.message); return; }
            alert('门店信息已保存，用户端将同步更新。');
        }

        // ================= 时段配置 =================
        async function loadSlotConfig() {
            const { data } = await supabaseClient.from('slot_config').select('*').order('slot');
            const container = document.getElementById('slotConfigList');
            container.innerHTML = '';
            if (!data) return;
            const globalDiv = document.createElement('div');
            globalDiv.style = 'grid-column:1/-1;background:#e6f7ff;border:1px solid #91d5ff;border-radius:6px;padding:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;';
            globalDiv.innerHTML = `
                <b style="color:#1890ff;">全局设置：</b>
                <label style="font-size:13px;">统一容量</label>
                <input type="number" min="1" max="10" value="1" id="globalCap" style="width:52px;padding:4px;border:1px solid #ddd;border-radius:4px;text-align:center;">
                <button onclick="applyGlobalCap()" style="padding:4px 12px;background:#1890ff;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;">应用到所有时段</button>
                <button onclick="toggleAllSlots(true)" style="padding:4px 12px;background:#52c41a;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;">全部开放</button>
                <button onclick="toggleAllSlots(false)" style="padding:4px 12px;background:#ff4d4f;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;">全部关闭</button>
            `;
            container.appendChild(globalDiv);
            data.forEach(s => {
                const endTime = slotEndTime(s.slot);
                const label = s.slot + '-' + endTime;
                const div = document.createElement('div');
                div.style = 'background:#f9f9f9;border:1px solid #eee;border-radius:6px;padding:10px;display:flex;align-items:center;gap:8px;';
                div.innerHTML = `
                    <span style="font-weight:bold;min-width:105px;font-size:13px;">${label}</span>
                    <label style="font-size:12px;color:#666;">容量</label>
                    <input type="number" min="0" max="10" value="${s.max_capacity}" data-slot="${s.slot}" data-field="cap" style="width:48px;padding:4px;border:1px solid #ddd;border-radius:4px;text-align:center;">
                    <label style="font-size:12px;color:#666;margin-left:4px;">开放</label>
                    <input type="checkbox" data-slot="${s.slot}" data-field="active" ${s.is_active ? 'checked' : ''}>
                `;
                container.appendChild(div);
            });
        }

        function applyGlobalCap() { const cap = document.getElementById('globalCap').value; document.querySelectorAll('[data-field="cap"]').forEach(inp => inp.value = cap); }
        function toggleAllSlots(active) { document.querySelectorAll('[data-field="active"]').forEach(cb => cb.checked = active); }

        async function saveSlotConfig() {
            const caps = document.querySelectorAll('[data-field="cap"]');
            const updates = [];
            caps.forEach(inp => {
                const slot = inp.dataset.slot;
                const cap = parseInt(inp.value) || 1;
                const activeEl = document.querySelector(`[data-field="active"][data-slot="${slot}"]`);
                const active = activeEl ? activeEl.checked : true;
                updates.push(supabaseClient.from('slot_config').update({ max_capacity: cap, is_active: active }).eq('slot', slot));
            });
            await Promise.all(updates);
            alert('时段配置已保存！');
        }

        // ================= 数据统计 =================
        async function loadStats(period) {
            const now = new Date();
            let startDate, endDate;
            if (period === 'day') { startDate = endDate = now.toISOString().split('T')[0]; }
            else if (period === 'week') {
                const day = now.getDay() || 7;
                const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
                const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
                startDate = mon.toISOString().split('T')[0]; endDate = sun.toISOString().split('T')[0];
            } else {
                startDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
                const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
                endDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${lastDay}`;
            }
            const { data } = await supabaseClient.from('appointments').select('appointment_date, package_type, status').gte('appointment_date', startDate).lte('appointment_date', endDate).neq('status', 'cancelled');
            if (!data) return;
            const total = data.length;
            const evalCount = data.filter(a => a.package_type === 'EVAL').length;
            const therapyCount = data.filter(a => a.package_type !== 'EVAL' && a.package_type !== 'MANUAL').length;
            const completed = data.filter(a => a.status === 'completed').length;
            const labels = { day: '今日', week: '本周', month: '本月' };
            document.getElementById('statsCards').innerHTML = `
                <div style="background:#e6f7ff;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#1890ff;">${total}</div><div style="font-size:13px;color:#666;">${labels[period]}总预约</div></div>
                <div style="background:#f6ffed;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#52c41a;">${completed}</div><div style="font-size:13px;color:#666;">已完成</div></div>
                <div style="background:#fff7e6;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#fa8c16;">${total - completed}</div><div style="font-size:13px;color:#666;">待完成</div></div>
                <div style="background:#f9f0ff;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#722ed1;">${evalCount}</div><div style="font-size:13px;color:#666;">首次评估</div></div>
                <div style="background:#fff0f6;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#eb2f96;">${therapyCount}</div><div style="font-size:13px;color:#666;">普通疗程</div></div>
                <div style="background:#e6fffb;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:bold;color:#13c2c2;">${total > 0 ? Math.round(completed/total*100) : 0}%</div><div style="font-size:13px;color:#666;">完成率</div></div>
            `;
            const byDate = {};
            data.forEach(a => {
                if (!byDate[a.appointment_date]) byDate[a.appointment_date] = { eval: 0, therapy: 0, manual: 0 };
                if (a.package_type === 'EVAL') byDate[a.appointment_date].eval++;
                else if (a.package_type === 'MANUAL') byDate[a.appointment_date].manual++;
                else byDate[a.appointment_date].therapy++;
            });
            let tableHtml = '<table><thead><tr><th>日期</th><th>首次评估</th><th>普通疗程</th><th>手动占用</th><th>小计</th></tr></thead><tbody>';
            Object.entries(byDate).sort().forEach(([date, cnt]) => { tableHtml += `<tr><td>${date}</td><td>${cnt.eval}</td><td>${cnt.therapy}</td><td>${cnt.manual}</td><td><b>${cnt.eval+cnt.therapy+cnt.manual}</b></td></tr>`; });
            tableHtml += '</tbody></table>';
            document.getElementById('statsDetail').innerHTML = tableHtml;
        }

        // ================= 待补录逻辑 =================
        async function loadPendingInfo() {
            const tbody = document.getElementById('pendingInfoTbody');
            tbody.innerHTML = '<tr><td colspan="6">加载中...</td></tr>';
            const { data, error } = await supabaseClient.from('appointments').select('id, appointment_date, time_slot, user_name, user_phone, user_remark, status')
                .eq('package_type', 'MANUAL').eq('need_info', true).neq('status', 'cancelled').order('appointment_date', { ascending: false });
            if (error) { tbody.innerHTML = '<tr><td colspan="6">加载失败: ' + error.message + '</td></tr>'; return; }
            const badge = document.getElementById('pendingInfoBadge');
            if (data && data.length > 0) { badge.style.display='inline'; badge.innerText=data.length; } else { badge.style.display='none'; }
            tbody.innerHTML = '';
            if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">暂无待补录记录</td></tr>'; return; }
            data.forEach(apt => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${apt.appointment_date}</td>
                    <td>${formatTimeSlot(apt.time_slot)}</td>
                    <td>${apt.user_name || '-'}</td>
                    <td>${apt.user_phone || '-'}</td>
                    <td style="font-size:12px;color:#999;">${apt.user_remark || '-'}</td>
                    <td>
                        <button class="btn-edit" onclick="openPendingInfoModal('${apt.id}','${(apt.user_name||'').replace(/'/g,'')}','${apt.user_phone||''}')">补录</button>
                        <button class="btn-edit" style="background:#6c757d;" onclick="skipPendingInfo('${apt.id}')">忽略</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadPendingInfoBadge() {
            const { count } = await supabaseClient.from('appointments').select('*', { count: 'exact', head: true }).eq('package_type', 'MANUAL').eq('need_info', true).neq('status', 'cancelled');
            const badge = document.getElementById('pendingInfoBadge');
            if (count && count > 0) { badge.style.display='inline'; badge.innerText=count; } else { badge.style.display='none'; }
        }

        function openPendingInfoModal(aptId, name, phone) {
            document.getElementById('piAptId').value = aptId;
            document.getElementById('piName').value = name;
            document.getElementById('piPhone').value = phone;
            document.getElementById('piPackage').value = 'A';
            document.getElementById('piSessions').value = 8;
            document.getElementById('piRemark').value = '';
            document.getElementById('pendingInfoModal').style.display = 'flex';
        }

        function closePendingInfoModal() { document.getElementById('pendingInfoModal').style.display = 'none'; }

        async function savePendingInfo() {
            const aptId = document.getElementById('piAptId').value;
            const name = document.getElementById('piName').value.trim();
            const phone = document.getElementById('piPhone').value.trim();
            const pkg = document.getElementById('piPackage').value;
            const sessions = parseInt(document.getElementById('piSessions').value);
            const remark = document.getElementById('piRemark').value.trim();
            if (!name || !phone || phone.length !== 11) { alert('请填写完整的姓名和11位手机号'); return; }
            try {
                const createResp = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/admin/users`, {
                    method: 'POST', headers: { 'Content-Type':'application/json', 'apikey':CONFIG.SUPABASE_SERVICE_KEY, 'Authorization':`Bearer ${CONFIG.SUPABASE_SERVICE_KEY}` },
                    body: JSON.stringify({ email: phone+'@phone.local', email_confirm:true, password: phone.slice(-4), user_metadata:{name,phone} })
                });
                const createData = await createResp.json();
                if (!createResp.ok) throw new Error(createData.msg || createData.message || '创建账号失败');
                const authId = createData.id;
                const { error: userErr } = await supabaseClient.from('users').insert({ id: authId, phone, name, package_type: pkg, remaining_sessions: sessions, total_sessions: sessions, admin_remark: remark });
                if (userErr) throw userErr;
                await supabaseClient.from('appointments').update({ user_id: authId, user_name: name, user_phone: phone, need_info: false }).eq('id', aptId);
                await supabaseClient.from('appointments').update({ user_id: authId, user_name: name, user_phone: phone, need_info: false }).eq('user_name', name).eq('user_phone', phone).eq('package_type', 'MANUAL');
                alert(`✅ 补录成功！\n${name} 的账号已创建，默认密码：${phone.slice(-4)}`);
                closePendingInfoModal(); loadPendingInfo(); loadUsers(); loadBoard();
            } catch(e) { alert('补录失败：' + e.message); }
        }

        async function skipPendingInfo(aptId) {
            if (!confirm('忽略后此条记录不再出现在待补录列表，确认？')) return;
            await supabaseClient.from('appointments').update({ need_info: false }).eq('id', aptId);
            loadPendingInfo();
        }

        // ================= 导出Excel逻辑 =================
        async function exportWeeklyExcel() {
            const today = new Date();
            const day = today.getDay();
            const diff = today.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(today); monday.setDate(diff); monday.setHours(0,0,0,0);
            const weekDates = [], weekDateStrings = [], weekDateKeys = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday); d.setDate(monday.getDate() + i);
                weekDates.push(d);
                const yyyy = d.getFullYear(), m = (d.getMonth()+1).toString().padStart(2,'0'), dayNum = d.getDate().toString().padStart(2,'0');
                weekDateKeys.push(`${yyyy}-${m}-${dayNum}`);
                const weekDays = ['日','一','二','三','四','五','六'];
                weekDateStrings.push(`${m}-${dayNum} (周${weekDays[d.getDay()]})`);
            }
            const { data, error } = await supabaseClient.from('appointments')
                .select('appointment_date, time_slot, user_name, user_phone, session_index, status')
                .in('appointment_date', weekDateKeys).neq('status', 'cancelled');
            if (error) { alert('查询数据失败：' + error.message); return; }
            const aptMap = {};
            if (data) data.forEach(a => { a.time_slot.split('+').forEach(s => { aptMap[`${a.appointment_date}_${s.trim()}`] = a; }); });
            const headers = ['时段'].concat(weekDateStrings);
            const rows = [];
            TIME_SLOTS.forEach(slot => { const row = [`${slot}-${slotEndTime(slot)}`]; weekDateKeys.forEach(() => row.push('')); rows.push(row); });
            const wsData = [headers].concat(rows);
            const merges = [];
            weekDateKeys.forEach((dateKey, colIdx) => {
                const processedApts = new Set();
                TIME_SLOTS.forEach((slot, rowIdx) => {
                    const apt = aptMap[`${dateKey}_${slot}`];
                    if (!apt) return;
                    const aptKey = `${dateKey}_${apt.time_slot}`;
                    if (processedApts.has(aptKey)) return;
                    processedApts.add(aptKey);
                    const slots = apt.time_slot.split('+');
                    const cellContent = `${apt.user_name} [${apt.session_index}]`;
                    const excelRow = rowIdx + 1, excelCol = colIdx + 1;
                    wsData[excelRow][excelCol] = cellContent;
                    if (slots.length === 2) { merges.push({ s: { r: excelRow, c: excelCol }, e: { r: excelRow + 1, c: excelCol } }); }
                });
            });
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!merges'] = merges;
            merges.forEach(m => {
                const cellAddr = XLSX.utils.encode_cell({ r: m.s.r, c: m.s.c });
                if (ws[cellAddr]) { ws[cellAddr].s = { alignment: { vertical: 'center', horizontal: 'center', wrapText: true } }; }
            });
            ws['!cols'] = [{ wch: 15 }, { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 18 }];
            XLSX.utils.book_append_sheet(wb, ws, '本周预约表');
            XLSX.writeFile(wb, `康复预约表_本周.xlsx`);
            alert('导出成功！');
        }
    </script>
