<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户管理后台 - 运动康复预约系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <style>
        body { background: #f8fafc; }
        .grid-cell { min-height: 60px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
        .row-header { background: #f1f5f9; font-weight: 600; }
        .col-header { background: #f1f5f9; font-weight: 600; }
        .booking-card { background: #dbeafe; border-left: 4px solid #3b82f6; padding: 4px; font-size: 12px; border-radius: 4px; margin: 2px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 登录页 -->
    <div id="adminLoginView" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-80">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">商户登录</h2>
            <input type="password" id="adminPwdInput" placeholder="请输入管理密码" 
                class="w-full px-4 py-3 border rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="adminLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                登录
            </button>
            <div class="mt-4 text-center">
                <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600">← 返回用户端</a>
            </div>
        </div>
    </div>

    <!-- 管理后台主界面 -->
    <div id="adminMainView" class="hidden">
        <!-- 顶部栏 -->
        <nav class="bg-white shadow-sm sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    🗓️ 康复预约管理系统
                </h1>
                <div class="flex gap-4 items-center">
                    <button onclick="exportWeeklyExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700 flex items-center gap-2">
                        <span>📥</span> 导出当周Excel
                    </button>
                    <button onclick="switchAdminTab('board')" id="tabBtnBoard" class="text-indigo-600 font-bold border-b-2 border-indigo-600 pb-1">预约看板</button>
                    <button onclick="switchAdminTab('users')" id="tabBtnUsers" class="text-gray-500 hover:text-gray-800">用户管理</button>
                    <button onclick="adminLogout()" class="text-red-500 text-sm">退出</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4">
            
            <!-- 1. 预约看板 -->
            <div id="adminBoardPanel">
                <!-- 周视图控制 -->
                <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex items-center justify-between">
                    <button onclick="moveWeek(-1)" class="p-2 hover:bg-gray-100 rounded-lg">← 上一周</button>
                    <h3 id="weekRangeDisplay" class="text-lg font-bold text-gray-700">2026年 第X周</h3>
                    <button onclick="moveWeek(1)" class="p-2 hover:bg-gray-100 rounded-lg">下一周 →</button>
                    <button onclick="jumpToToday()" class="ml-4 px-3 py-1 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">回到本周</button>
                </div>

                <!-- 周视图Grid -->
                <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
                    <div id="scheduleGrid" class="min-w-[900px]">
                        <!-- Grid will be generated here -->
                    </div>
                </div>
            </div>

            <!-- 2. 用户管理 -->
            <div id="adminUsersPanel" class="hidden">
                <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex justify-between items-center">
                    <h3 class="font-bold text-lg">用户列表</h3>
                    <button onclick="openAddUserModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">+ 新增用户</button>
                </div>
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-4 text-sm font-semibold text-gray-600">姓名</th>
                                <th class="p-4 text-sm font-semibold text-gray-600">手机号</th>
                                <th class="p-4 text-sm font-semibold text-gray-600">套餐</th>
                                <th class="p-4 text-sm font-semibold text-gray-600">剩余/总次数</th>
                                <th class="p-4 text-sm font-semibold text-gray-600">已用课时</th>
                                <th class="p-4 text-sm font-semibold text-gray-600">操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Rows here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- 编辑用户弹窗 -->
    <div id="userModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-96 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">编辑用户</h3>
            <input type="hidden" id="editUserId">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">姓名</label>
                    <input type="text" id="editUserName" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">手机号</label>
                    <input type="text" id="editUserPhone" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">套餐类型</label>
                    <select id="editUserPkgType" class="w-full border rounded-lg p-2 outline-none">
                        <option value="A">套餐A (8次)</option>
                        <option value="B">套餐B (4次)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">剩余次数</label>
                    <input type="number" id="editUserRemaining" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div class="mt-6 flex gap-3 justify-end">
                <button onclick="closeUserModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                <button onclick="saveUser()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast 复用 -->
    <div id="adminToast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 hidden">
        <span id="adminToastMsg">消息</span>
    </div>

    <script>
        let adminSupabase = null;
        let currentWeekStart = null;
        let allAppointments = [];
        let isAdminLoggedIn = false;

        document.addEventListener('DOMContentLoaded', () => {
            // 尝试使用 service key 初始化 (注意：前端隐藏service key很难，这里为了简化单体应用直接使用，生产建议走Edge Functions)
            try {
                // 检查本地登录状态
                if (sessionStorage.getItem('admin_logged_in') === 'true') {
                    initAdminClient();
                    renderAdminMain();
                }
            } catch(e) {
                console.error(e);
            }
        });

        function adminLogin() {
            const pwd = document.getElementById('adminPwdInput').value;
            if (pwd === CONFIG.ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                initAdminClient();
                renderAdminMain();
            } else {
                showAdminToast('密码错误');
            }
        }

        function initAdminClient() {
            // 注意：在前端使用 service_role key 是不安全的，任何人都可以F12看到并修改数据库
            // 这只是一个为了满足"零后端"的折中方案，请确保只在私密网络/或添加IP白名单，或后续改为Edge Functions
            adminSupabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_SERVICE_KEY);
        }

        function renderAdminMain() {
            document.getElementById('adminLoginView').classList.add('hidden');
            document.getElementById('adminMainView').classList.remove('hidden');
            jumpToToday();
            loadAllUsers();
            // 开启简单的轮询刷新 (30秒)
            setInterval(() => {
                if (document.getElementById('adminBoardPanel').classList.contains('hidden') === false) {
                    loadBoardData();
                }
            }, 30000);
        }

        function adminLogout() {
            sessionStorage.removeItem('admin_logged_in');
            location.reload();
        }

        // ================= 周视图逻辑 =================
        function jumpToToday() {
            const today = new Date();
            const day = today.getDay(); // 0 是周日
            const diff = today.getDate() - day + (day === 0 ? -6 : 1); // 周一为始
            currentWeekStart = new Date(today.setDate(diff));
            currentWeekStart.setHours(0,0,0,0);
            renderWeekRange();
            loadBoardData();
        }

        function moveWeek(delta) {
            currentWeekStart.setDate(currentWeekStart.getDate() + (delta * 7));
            renderWeekRange();
            loadBoardData();
        }

        function renderWeekRange() {
            const end = new Date(currentWeekStart);
            end.setDate(currentWeekStart.getDate() + 6);
            const fmt = (d) => `${d.getMonth()+1}月${d.getDate()}日`;
            document.getElementById('weekRangeDisplay').innerText = 
                `${currentWeekStart.getFullYear()}年 ${fmt(currentWeekStart)} - ${fmt(end)}`;
        }

        async function loadBoardData() {
            if(!adminSupabase) return;
            // 加载这一周的预约
            const startStr = currentWeekStart.toISOString().split('T')[0];
            const endDate = new Date(currentWeekStart);
            endDate.setDate(currentWeekStart.getDate() + 6);
            const endStr = endDate.toISOString().split('T')[0];

            const { data } = await adminSupabase
                .from('appointments')
                .select('*')
                .gte('appointment_date', startStr)
                .lte('appointment_date', endStr)
                .order('appointment_date', { ascending: true });
            
            allAppointments = data || [];
            renderScheduleGrid();
        }

        function renderScheduleGrid() {
            const grid = document.getElementById('scheduleGrid');
            const slots = CONFIG.getTimeSlots();
            const daysOfWeek = ['一', '二', '三', '四', '五', '六', '日'];
            
            // 构建表头
            let html = '<div class="grid grid-cols-8 border-t border-l border-gray-200">';
            
            // 左上角空格
            html += `<div class="grid-cell row-header col-header p-3 text-center text-gray-500">时段</div>`;
            
            // 日期表头
            for(let i=0; i<7; i++) {
                const d = new Date(currentWeekStart);
                d.setDate(currentWeekStart.getDate() + i);
                const isToday = d.toDateString() === new Date().toDateString();
                html += `
                    <div class="grid-cell col-header p-2 text-center ${isToday ? 'bg-indigo-100 text-indigo-700' : ''}">
                        <div class="text-xs text-gray-400">周${daysOfWeek[i]}</div>
                        <div class="font-bold">${d.getMonth()+1}/${d.getDate()}</div>
                    </div>
                `;
            }

            // 每行：一个时段
            slots.forEach(slot => {
                // 行头：时段名
                html += `<div class="grid-cell row-header p-2 text-center text-sm flex items-center justify-center text-gray-600">${slot}</div>`;
                
                // 7天的格子
                for(let i=0; i<7; i++) {
                    const d = new Date(currentWeekStart);
                    d.setDate(currentWeekStart.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];
                    
                    // 找预约
                    const apt = allAppointments.find(a => a.appointment_date === dateStr && a.time_slot === slot);
                    
                    let cellContent = '';
                    if (apt) {
                        let bgColor = apt.status === 'cancelled' ? 'bg-gray-100 line-through text-gray-400' : 'bg-blue-50';
                        cellContent = `
                            <div class="p-1 ${bgColor} h-full min-h-[60px]">
                                <div class="font-bold text-xs text-gray-800">${apt.user_name}</div>
                                <div class="text-xs text-gray-500">${apt.session_index}</div>
                                <div class="text-xs text-gray-400 truncate">${apt.user_phone}</div>
                            </div>
                        `;
                    }
                    
                    html += `<div class="grid-cell p-0">${cellContent}</div>`;
                }
            });

            html += '</div>';
            grid.innerHTML = html;
        }

        // ================= 用户管理逻辑 =================
        async function loadAllUsers() {
            if(!adminSupabase) return;
            const { data } = await adminSupabase.from('users').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            (data || []).forEach(u => {
                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="p-4 font-medium">${u.name}</td>
                    <td class="p-4 text-gray-600">${u.phone}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${u.package_type==='A'?'bg-purple-100 text-purple-700':'bg-orange-100 text-orange-700'}">套餐${u.package_type}</span></td>
                    <td class="p-4 font-bold text-indigo-600">${u.remaining_sessions} / ${u.total_sessions}</td>
                    <td class="p-4 text-gray-500 text-sm">${(u.used_session_indices || []).join(', ')}</td>
                    <td class="p-4">
                        <button onclick='editUser(${JSON.stringify(u).replace(/'/g,"\\'")})' class="text-indigo-600 hover:underline text-sm mr-2">编辑</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openAddUserModal() {
            document.getElementById('modalTitle').innerText = '新增用户';
            document.getElementById('editUserId').value = '';
            document.getElementById('editUserName').value = '';
            document.getElementById('editUserPhone').value = '';
            document.getElementById('editUserPkgType').value = 'A';
            document.getElementById('editUserRemaining').value = '8';
            document.getElementById('userModal').classList.remove('hidden');
        }

        function editUser(u) {
            document.getElementById('modalTitle').innerText = '编辑用户';
            document.getElementById('editUserId').value = u.id;
            document.getElementById('editUserName').value = u.name;
            document.getElementById('editUserPhone').value = u.phone;
            document.getElementById('editUserPkgType').value = u.package_type;
            document.getElementById('editUserRemaining').value = u.remaining_sessions;
            document.getElementById('userModal').classList.remove('hidden');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.add('hidden');
        }

        async function saveUser() {
            const id = document.getElementById('editUserId').value;
            const name = document.getElementById('editUserName').value;
            const phone = document.getElementById('editUserPhone').value;
            const pkgType = document.getElementById('editUserPkgType').value;
            const remaining = parseInt(document.getElementById('editUserRemaining').value);
            const total = CONFIG.PACKAGES[pkgType].total;

            if (!name || !phone) return showAdminToast('请填写完整');

            try {
                if (id) {
                    // Update
                    await adminSupabase.from('users').update({ name, phone, package_type: pkgType, remaining_sessions: remaining, total_sessions: total }).eq('id', id);
                } else {
                    // Insert - 注意：真实场景需要先在Auth里创建用户，这里只创建DB记录用于演示
                    // 这里假设你会手动去Auth里创建，或者通过Trigger处理
                    // 为了演示，生成一个假UUID，实际必须关联 auth.users.id
                    showAdminToast('功能受限：请先在Supabase Auth中创建用户，再在此处通过编辑关联ID');
                    // await adminSupabase.from('users').insert({ id: uuidv4(), ... }); 
                    closeUserModal();
                    return;
                }
                showAdminToast('保存成功');
                closeUserModal();
                loadAllUsers();
            } catch (e) {
                console.error(e);
                showAdminToast('保存失败');
            }
        }

        // ================= 导出 Excel =================
        function exportWeeklyExcel() {
            const wb = XLSX.utils.book_new();
            const wsData = [];
            const slots = CONFIG.getTimeSlots();
            const daysOfWeek = ['一', '二', '三', '四', '五', '六', '日'];
            
            // 1. 生成表头行
            const headers = ['时段'];
            for(let i=0; i<7; i++) {
                const d = new Date(currentWeekStart);
                d.setDate(currentWeekStart.getDate() + i);
                headers.push(`周${daysOfWeek[i]} ${d.getMonth()+1}/${d.getDate()}`);
            }
            wsData.push(headers);

            // 2. 生成数据行
            slots.forEach(slot => {
                const row = [slot];
                for(let i=0; i<7; i++) {
                    const d = new Date(currentWeekStart);
                    d.setDate(currentWeekStart.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];
                    const apt = allAppointments.find(a => a.appointment_date === dateStr && a.time_slot === slot);
                    
                    if (apt && apt.status !== 'cancelled') {
                        row.push(`${apt.user_name} (${apt.session_index})`);
                    } else {
                        row.push(''); // 保持空格
                    }
                }
                wsData.push(row);
            });

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            
            // 设置列宽
            ws['!cols'] = [ {wch: 15} ];
            for(let i=0; i<7; i++) ws['!cols'].push({wch: 20});

            XLSX.utils.book_append_sheet(wb, ws, '预约表');
            
            // 文件名
            const fileName = `康复预约表_${currentWeekStart.getMonth()+1}月${currentWeekStart.getDate()}日周.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            showAdminToast('导出成功');
        }

        function switchAdminTab(tab) {
            if (tab === 'board') {
                document.getElementById('adminBoardPanel').classList.remove('hidden');
                document.getElementById('adminUsersPanel').classList.add('hidden');
                document.getElementById('tabBtnBoard').classList.add('text-indigo-600', 'font-bold', 'border-b-2', 'border-indigo-600', 'pb-1');
                document.getElementById('tabBtnBoard').classList.remove('text-gray-500');
                document.getElementById('tabBtnUsers').classList.remove('text-indigo-600', 'font-bold', 'border-b-2', 'border-indigo-600', 'pb-1');
                document.getElementById('tabBtnUsers').classList.add('text-gray-500');
                loadBoardData();
            } else {
                document.getElementById('adminUsersPanel').classList.remove('hidden');
                document.getElementById('adminBoardPanel').classList.add('hidden');
                document.getElementById('tabBtnUsers').classList.add('text-indigo-600', 'font-bold', 'border-b-2', 'border-indigo-600', 'pb-1');
                document.getElementById('tabBtnUsers').classList.remove('text-gray-500');
                document.getElementById('tabBtnBoard').classList.remove('text-indigo-600', 'font-bold', 'border-b-2', 'border-indigo-600', 'pb-1');
                document.getElementById('tabBtnBoard').classList.add('text-gray-500');
                loadAllUsers();
            }
        }

        function showAdminToast(msg) {
            const t = document.getElementById('adminToast');
            document.getElementById('adminToastMsg').innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>
