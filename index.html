<body class="min-h-screen pb-20">

    <!-- 顶部导航 -->

    <main class="max-w-lg mx-auto p-4">
        
        <!-- 1. 登录页面 -->
        <div id="loginView" class="fade-in">
            <div class="bg-white rounded-2xl shadow-xl p-6 mt-10">
                <div class="text-center mb-6">

                <div class="space-y-4">
                    <div>

        <!-- 2. 主界面 (预约+我的) -->

                    </div>

                <!-- 时段选择器 -->

                    <h4 class="font-bold text-gray-700 mb-3 flex items-center gap-2">🕐 选择时段</h4>
                    <div id="slotContainer" class="grid grid-cols-3 gap-3">

                    </div>
                    <button id="confirmBookingBtn" onclick="submitBooking()" disabled
                        class="w-full mt-6 py-3 bg-gray-300 text-gray-500 rounded-xl font-bold transition cursor-not-allowed">
                        请先选择时段
                    </button>
                </div>
            </div>

            <!-- 历史记录面板 -->
            <div id="historyPanel" class="hidden fade-in space-y-3">
                <div id="historyList">
                    <!-- 记录将通过JS生成 -->
                </div>

        </div>
    </main>

    <!-- 底部管理入口 (仅做跳转提示) -->
    <div class="fixed bottom-4 right-4 opacity-20">
        <a href="admin.html" class="text-gray-600 text-xs">商户入口</a>

    <!-- 简易 Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 hidden transition-all duration-300">
        <span id="toastMsg">消息内容</span>
    </div>

    <script>
        // ================= 全局变量初始化 =================
        let supabaseClient = null;
        let currentUser = null; // Auth User
        let userProfile = null; // DB Profile
        let selectedDate = null;
        let selectedSlot = null;
        let appointmentsMap = {}; // 缓存选中日期的预约 { [slot]: status }
        let countdownTimer = null;

        // ================= 初始化 =================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 初始化 Supabase
                supabaseClient = window.supabase ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY) : null;
                if(!supabaseClient) {
                    showToast("未检测到Supabase库，请检查网络");
                    // 本地演示模式占位
                }
            } catch (e) {
                console.error(e);
            }

            // 检查登录状态
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                // 这是从邮件链接跳转回来的情况 (Supabase默认行为)
                // 我们不需要处理，自动会保持状态
            }
            
            await checkSession();
        });

        // ================= 认证相关 =================
        async function checkSession() {
            if(!supabaseClient) return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                await loadUserProfile();
            }
        }

        async function passwordLogin() {
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!phone || phone.length !== 11) {
                showToast('请输入正确的手机号');
                return;
            }
            if (!password) {
                showToast('请输入密码');
                return;
            }

            showLoading('loginBtn', true, '登录中...');
            try {
                // Supabase 用 phone 登录需要带国际区号，用 email 模拟则用手机号@phone.local
                // 这里使用 phone + password 方式
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: phone + '@phone.local',
                    password: password
                });

                if (error) {
                    if (error.message.includes('Invalid') || error.message.includes('invalid')) {
                        showToast('手机号或密码错误');
                    } else {
                        showToast(error.message);
                    }
                    return;
                }

                currentUser = data.user;
                await loadUserProfile();

            } catch (err) {
                console.error(err);
                showToast('登录失败，请重试');
            } finally {
                showLoading('loginBtn', false);
            }
        }


        async function loadUserProfile() {
            if(!currentUser) return;
            
            // 1. 从 users 表读取信息
            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('id', currentUser.id)
                .single();

            if (error || !data) {
                showToast('未找到您的档案，请联系机构开通');
                await supabaseClient.auth.signOut();
                return;
            }

            userProfile = data;
            enterMainUI();
        }

        function enterMainUI() {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            
            // 渲染用户信息
            renderUserInfo();
            // 初始化日期
            initDatePicker();
            // 加载历史记录数据
            loadHistory();
            // 加载取消次数
            loadCancelCount();
        }

        function renderUserInfo() {
            document.getElementById('userName').innerText = userProfile.name;
            document.getElementById('userPhone').innerText = userProfile.phone;
            document.getElementById('remainCount').innerText = userProfile.remaining_sessions;
            const pkg = CONFIG.PACKAGES[userProfile.package_type];
            document.getElementById('packageTypeLabel').innerText = `${pkg.name} (${pkg.total}次)`;
        }

        // ================= 预约功能 =================
        
        function initDatePicker() {
            const container = document.getElementById('datePicker');
            container.innerHTML = '';
            const today = new Date();
            
            for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const isToday = i === 0;
                
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center transition border-2 ${i===0 ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-transparent bg-gray-50 text-gray-700 hover:bg-gray-100'}`;
                btn.innerHTML = `
                    <span class="text-xs text-gray-400">${isToday ? '今天' : ['日','一','二','三','四','五','六'][d.getDay()]}</span>
                    <span class="text-xl font-bold">${d.getDate()}</span>
                    <span class="text-xs">${d.getMonth()+1}月</span>
                `;
                btn.onclick = () => selectDate(dateStr, btn, d);
                container.appendChild(btn);
                
                if (i === 0) {
                    selectDate(dateStr, btn, d); // 默认选中今天
                }
            }
        }

        async function selectDate(dateStr, btnEl, dateObj) {
            // UI更新
            document.querySelectorAll('#datePicker button').forEach(b => {
                b.className = 'flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center transition border-2 border-transparent bg-gray-50 text-gray-700 hover:bg-gray-100';
            });
            btnEl.className = 'flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center transition border-2 border-indigo-500 bg-indigo-50 text-indigo-700';
            
            selectedDate = dateStr;
            selectedSlot = null;
            updateBookingBtn();
            
            // 加载该日预约情况
            await loadSlots(dateStr, dateObj);
        }

        async function loadSlots(dateStr, dateObj) {
            const container = document.getElementById('slotContainer');
            container.innerHTML = '<div class="col-span-3 text-center py-4 text-gray-400">加载中...</div>';
            
            const isToday = dateStr === new Date().toISOString().split('T')[0];
            const nowHour = new Date().getHours();
            
            // 1. 查库
            const { data } = await supabaseClient
                .from('appointments')
                .select('*')
                .eq('appointment_date', dateStr)
                .eq('status', 'pending');
                
            const bookedMap = {};
            if(data) data.forEach(a => bookedMap[a.time_slot] = a);

            // 2. 渲染
            container.innerHTML = '';
            const slots = CONFIG.getTimeSlots();
            
            slots.forEach(slot => {
                const startHour = parseInt(slot.split(':')[0]);
                const isPast = isToday && (nowHour >= startHour);
                const isBooked = !!bookedMap[slot];
                
                const btn = document.createElement('button');
                let cls = 'py-3 rounded-xl text-sm font-medium transition ';
                
                if (isPast) {
                    cls += 'bg-gray-100 text-gray-300 cursor-not-allowed';
                    btn.disabled = true;
                    btn.innerText = slot + ' (已过)';
                } else if (isBooked) {
                    cls += 'slot-booked';
                    btn.disabled = true;
                    btn.innerText = slot;
                } else {
                    cls += 'slot-free hover:opacity-90 active:scale-95';
                    btn.innerText = slot;
                    btn.onclick = () => selectSlot(slot, btn);
                }
                
                btn.className = cls;
                container.appendChild(btn);
            });
        }

        function selectSlot(slot, btnEl) {
            document.querySelectorAll('#slotContainer button').forEach(b => {
                if(!b.disabled && b.classList.contains('slot-selected')) {
                    b.classList.remove('slot-selected');
                    b.classList.add('slot-free');
                }
            });
            
            if(btnEl) {
                btnEl.classList.remove('slot-free');
                btnEl.classList.add('slot-selected');
                selectedSlot = slot;
            } else {
                selectedSlot = null;
            }
            updateBookingBtn();
        }

        function updateBookingBtn() {
            const btn = document.getElementById('confirmBookingBtn');
            if (selectedSlot) {
                btn.disabled = false;
                btn.className = 'w-full mt-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition cursor-pointer';
                btn.innerText = `确认预约 ${selectedSlot}`;
            } else {
                btn.disabled = true;
                btn.className = 'w-full mt-6 py-3 bg-gray-300 text-gray-500 rounded-xl font-bold transition cursor-not-allowed';
                btn.innerText = '请先选择时段';
            }
        }

        async function submitBooking() {
            if (!selectedSlot || !selectedDate || !userProfile) return;
            
            // 规则校验
            if (userProfile.remaining_sessions <= 0) {
                showToast('套餐次数不足，请先充值');
                return;
            }
            
            // 生成下一次课序号 (例如 A3)
            const pkgType = userProfile.package_type;
            const totalSessions = CONFIG.PACKAGES[pkgType].total;
            const usedIndices = userProfile.used_session_indices || [];
            let nextIndex = 1;
            for(let i=1; i<=totalSessions; i++) {
                const key = `${pkgType}${i}`;
                if(!usedIndices.includes(key)) {
                    nextIndex = i;
                    break;
                }
            }
            const sessionIndexStr = `${pkgType}${nextIndex}`;
            
            // 校验是否有未完成的课程 (规则：上一次没结束不能约下一次)
            const hasUnfinished = await checkUnfinishedAppointment();
            if (hasUnfinished) {
                showToast('您有未结束的课程，暂时无法预约新时段');
                return;
            }

            if (!confirm(`确认预约 ${selectedDate} ${selectedSlot}？\n本次将使用：${sessionIndexStr}`)) return;

            // 事务逻辑：通过 RPC 或 前端分步 (此处简化为前端分步，生产环境建议用DB Function)
            // 简易流程：1. 锁定时段(Insert) -> 2. 扣次数 -> 3. 记录使用Index
            
            showLoading('confirmBookingBtn', true, '提交中...');
            try {
                // 1. 插入预约 (利用Unique约束防止超卖)
                const { error: insError } = await supabaseClient.from('appointments').insert({
                    user_id: userProfile.id,
                    user_name: userProfile.name,
                    user_phone: userProfile.phone,
                    appointment_date: selectedDate,
                    time_slot: selectedSlot,
                    status: 'pending',
                    package_type: pkgType,
                    session_index: sessionIndexStr
                });
                
                if (insError) {
                    if (insError.code === '23505') throw new Error('手慢了，该时段已被预约');
                    throw insError;
                }

                // 2. 更新用户剩余次数 & 记录已使用Index
                const newRemaining = userProfile.remaining_sessions - 1;
                const newUsedIndices = [...usedIndices, sessionIndexStr];
                
                const { error: updError } = await supabaseClient
                    .from('users')
                    .update({ 
                        remaining_sessions: newRemaining, 
                        used_session_indices: newUsedIndices 
                    })
                    .eq('id', userProfile.id);
                
                if (updError) throw updError;
                
                // 本地更新
                userProfile.remaining_sessions = newRemaining;
                userProfile.used_session_indices = newUsedIndices;

                showToast('预约成功！');
                selectSlot(null, null); // 清空选中
                renderUserInfo(); // 更新卡片
                loadSlots(selectedDate, new Date(selectedDate)); // 刷新时段
                loadHistory(); // 刷新历史
                
            } catch (err) {
                console.error(err);
                showToast(err.message || '预约失败，请重试');
            } finally {
                showLoading('confirmBookingBtn', false);
                updateBookingBtn();
            }
        }

        async function checkUnfinishedAppointment() {
            // 查找状态为 pending 且 时间 < 现在 的预约（实际上应该只看有没有 pending 的，逻辑简化为：有 pending 就算未完成）
            // 业务逻辑定义：只要有状态为"待履约"的订单，就不能约下一次
            const { data } = await supabaseClient
                .from('appointments')
                .select('id')
                .eq('user_id', userProfile.id)
                .eq('status', 'pending')
                .limit(1);
            
            return data && data.length > 0;
        }

        // ================= 历史记录 & 取消 =================
        
        async function loadHistory() {
            if(!userProfile) return;
            const { data } = await supabaseClient
                .from('appointments')
                .select('*')
                .eq('user_id', userProfile.id)
                .order('appointment_date', { ascending: false })
                .order('time_slot', { ascending: false });
                
            const container = document.getElementById('historyList');
            const empty = document.getElementById('emptyHistory');
            container.innerHTML = '';
            
            if (!data || data.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            
            data.forEach(apt => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm';
                
                // 状态颜色
                let statusBadge = '';
                let statusColor = '';
                if (apt.status === 'pending') {
                    statusBadge = '待履约';
                    statusColor = 'bg-blue-100 text-blue-700';
                } else if (apt.status === 'completed') {
                    statusBadge = '已完成';
                    statusColor = 'bg-green-100 text-green-700';
                } else {
                    statusBadge = '已取消';
                    statusColor = 'bg-gray-100 text-gray-500';
                }

                // 判断能否取消
                const canCancel = checkCanCancel(apt);

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="font-bold text-lg text-gray-800">${apt.appointment_date}</span>
                            <span class="text-gray-500 ml-2">${apt.time_slot}</span>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-full ${statusColor}">${statusBadge}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm text-gray-600">
                        <div class="flex items-center gap-2">
                            <span class="bg-purple-50 text-purple-600 px-2 py-0.5 rounded border border-purple-100">${apt.session_index}</span>
                            <span>康复课程</span>
                        </div>
                        ${apt.status === 'pending' ? `
                            <button onclick="cancelAppointment('${apt.id}', '${apt.appointment_date}', '${apt.time_slot}')" 
                                class="${canCancel ? 'text-red-500 hover:text-red-700 font-medium' : 'text-gray-400 cursor-not-allowed'}"
                                ${canCancel ? '' : 'disabled'}>
                                ${canCancel ? '取消预约' : getCancelDisabledReason(apt)}
                            </button>
                        ` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function checkCanCancel(apt) {
            if (apt.status !== 'pending') return false;
            
            // 组合时间
            const startStr = `${apt.appointment_date} ${apt.time_slot.split('-')[0]}:00`;
            const startTime = new Date(startStr).getTime();
            const now = new Date().getTime();
            const diffHours = (startTime - now) / (1000 * 60 * 60);
            
            if (diffHours < CONFIG.CANCEL_MIN_HOURS) return false;
            return true;
        }

        function getCancelDisabledReason(apt) {
            const startStr = `${apt.appointment_date} ${apt.time_slot.split('-')[0]}:00`;
            const startTime = new Date(startStr).getTime();
            const now = new Date().getTime();
            const diffHours = (startTime - now) / (1000 * 60 * 60);
            if (diffHours < CONFIG.CANCEL_MIN_HOURS) return '距开始不足6小时';
            return '不可操作';
        }

        async function loadCancelCount() {
            const now = new Date();
            const ym = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}`;
            
            const { count } = await supabaseClient
                .from('operation_logs')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', userProfile.id)
                .eq('year_month', ym)
                .eq('operation_type', 'cancel');
                
            document.getElementById('cancelCountUsed').innerText = count || 0;
        }

        async function cancelAppointment(id, date, slot) {
            // 检查当月取消次数
            const countEl = document.getElementById('cancelCountUsed');
            const currentCount = parseInt(countEl.innerText);
            if (currentCount >= CONFIG.MONTHLY_CANCEL_LIMIT) {
                showToast('本月取消次数已达上限');
                return;
            }

            if (!confirm('确定要取消吗？\n次数将返还至您的账户。')) return;

            // 事务：1. 更新预约状态 -> 2. 加回次数 -> 3. 移除used_index -> 4. 记录取消日志
            // 这里还是用简单的前端分步，实际建议使用Database Function/Transaction
            
            try {
                // 1. 获取预约详情，获取 session_index
                const { data: aptData } = await supabaseClient.from('appointments').select('session_index').eq('id', id).single();
                if(!aptData) throw new Error('未找到预约');
                
                // 2. 更新状态
                const { error: upAptErr } = await supabaseClient
                    .from('appointments')
                    .update({ status: 'cancelled' })
                    .eq('id', id);
                if(upAptErr) throw upAptErr;

                // 3. 更新用户：次数+1，移除used_index
                const idxToRemove = aptData.session_index;
                const newRemaining = userProfile.remaining_sessions + 1;
                const newUsedIndices = (userProfile.used_session_indices || []).filter(i => i !== idxToRemove);
                
                const { error: upUserErr } = await supabaseClient
                    .from('users')
                    .update({ 
                        remaining_sessions: newRemaining, 
                        used_session_indices: newUsedIndices 
                    })
                    .eq('id', userProfile.id);
                if(upUserErr) throw upUserErr;
                
                // 4. 记录日志
                const now = new Date();
                const ym = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}`;
                await supabaseClient.from('operation_logs').insert({
                    user_id: userProfile.id,
                    operation_type: 'cancel',
                    year_month: ym
                });

                // 更新本地
                userProfile.remaining_sessions = newRemaining;
                userProfile.used_session_indices = newUsedIndices;

                showToast('已取消');
                renderUserInfo();
                loadHistory();
                loadCancelCount();
                if (selectedDate === date) {
                    loadSlots(selectedDate, new Date(selectedDate));
                }

            } catch (err) {
                console.error(err);
                showToast('操作失败');
            }
        }

        // ================= UI 辅助 =================
        
        function switchTab(tab) {
            if (tab === 'booking') {
                document.getElementById('tabBooking').classList.add('tab-active');
                document.getElementById('tabHistory').classList.remove('tab-active');
                document.getElementById('bookingPanel').classList.remove('hidden');
                document.getElementById('historyPanel').classList.add('hidden');
            } else {
                document.getElementById('tabHistory').classList.add('tab-active');
                document.getElementById('tabBooking').classList.remove('tab-active');
                document.getElementById('historyPanel').classList.remove('hidden');
                document.getElementById('bookingPanel').classList.add('hidden');
                loadHistory();
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            location.reload();
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        function showLoading(btnId, isLoading, text='处理中...') {
            const btn = document.getElementById(btnId);
            if(!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.dataset.oldText = btn.innerText;
                btn.innerText = text;
            } else {
                btn.disabled = false;
                if(btn.dataset.oldText) btn.innerText = btn.dataset.oldText;
            }
        }

        function startCountdown() {
            let sec = 60;
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                sec--;
                btn.innerText = `${sec}秒后重试`;
                if (sec <= 0) {
                    clearInterval(countdownTimer);
                    btn.innerText = '重新发送';
                    btn.disabled = false;
                }
            }, 1000);
        }
