    CANCEL_MIN_HOURS: 6,

    BUSINESS_START: 11,   // 11:00
    BUSINESS_END: 21,     // 21:00 (最后时段 20:30-21:00)
    // 生成30分钟时间格列表
    getSlots: function() {
        const slots = [];
        for (let h = this.BUSINESS_START; h < this.BUSINESS_END; h++) {
            slots.push(`${String(h).padStart(2,'0')}:00`);
            slots.push(`${String(h).padStart(2,'0')}:30`);
        }
        return slots; // ['11:00','11:30','12:00',...,'20:30']
    }

<!-- Toast -->
<div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 hidden">

<script>
// ===== 全局变量 =====
let supabaseClient = null;
let currentUser = null;
let userProfile = null;
let selectedDate = null;
let selectedSlots = [];   // 新用户最多1格，老用户最多2格
let bookedSet = new Set(); // 当天已被占用的时间格

const ALL_SLOTS = CONFIG.getSlots(); // ['11:00','11:30',...]

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', async () => {
    supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        currentUser = session.user;
        await loadUserProfile();
    }
});

// ===== 工具函数 =====
function isNewUser(profile) {
    return profile.package_type === 'EVAL';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2500);
}

function showLoading(btnId, loading, text='处理中...') {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    if (loading) { btn.disabled=true; btn._old=btn.innerText; btn.innerText=text; }
    else { btn.disabled=false; if(btn._old) btn.innerText=btn._old; }
}

// ===== 认证相关 =====
function switchAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').className = `flex-1 py-2 rounded-lg text-sm font-medium transition ${isLogin ? 'bg-white shadow text-indigo-600' : 'text-gray-500'}`;
    document.getElementById('tabRegister').className = `flex-1 py-2 rounded-lg text-sm font-medium transition ${!isLogin ? 'bg-white shadow text-indigo-600' : 'text-gray-500'}`;
}

async function doLogin() {
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!phone || phone.length !== 11) { showToast('请输入正确的手机号'); return; }
    if (!password) { showToast('请输入密码'); return; }

    showLoading('loginBtn', true, '登录中...');
    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: phone + '@phone.local',
            password
        });
        if (error) { showToast('手机号或密码错误'); return; }
        currentUser = data.user;
        await loadUserProfile();
    } catch(e) {
        showToast('登录失败，请重试');
    } finally {
        showLoading('loginBtn', false);
    }
}

async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    if (!name) { showToast('请输入姓名'); return; }
    if (!phone || phone.length !== 11 || !/^1\d{10}$/.test(phone)) { showToast('请输入正确的手机号'); return; }

    showLoading('registerBtn', true, '注册中...');
    try {
        // 1. 用 service key 创建 Auth 账号
        const resp = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/admin/users`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': CONFIG.SUPABASE_SERVICE_KEY,
                'Authorization': `Bearer ${CONFIG.SUPABASE_SERVICE_KEY}`
            },
            body: JSON.stringify({
                email: phone + '@phone.local',
                email_confirm: true,
                password: phone.slice(-4),
                user_metadata: { name, phone }
            })
        });
        const created = await resp.json();
        if (!resp.ok) {
            if (resp.status === 422) { showToast('该手机号已注册，请直接登录'); return; }
            throw new Error(created.msg || '注册失败');
        }

        // 2. 写入 users 表，新用户 package_type='EVAL'，次数=1
        const { error: dbErr } = await supabaseClient.from('users').insert({
            id: created.id,
            phone,
            name,
            package_type: 'EVAL',
            total_sessions: 1,
            remaining_sessions: 1,
            used_session_indices: []
        });
        if (dbErr) throw dbErr;

        showToast('注册成功！请用手机号后4位登录');
        switchAuthTab('login');
        document.getElementById('loginPhone').value = phone;
        document.getElementById('loginPassword').value = '';

    } catch(e) {
        showToast(e.message || '注册失败，请重试');
    } finally {
        showLoading('registerBtn', false);
    }
}

async function loadUserProfile() {
    const { data, error } = await supabaseClient
        .from('users').select('*').eq('id', currentUser.id).single();
    if (error || !data) { showToast('加载用户信息失败'); return; }
    userProfile = data;
    enterMainUI();
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

// ===== 主界面 =====
function enterMainUI() {
    document.getElementById('authView').classList.add('hidden');
    document.getElementById('mainView').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    renderUserInfo();
    initDatePicker();
    loadCancelCount();
}

function renderUserInfo() {
    document.getElementById('uName').innerText = userProfile.name;
    document.getElementById('uPhone').innerText = userProfile.phone;
    document.getElementById('uRemain').innerText = userProfile.remaining_sessions;
    if (isNewUser(userProfile)) {
        document.getElementById('uRemainLabel').innerText = '评估次数';
        document.getElementById('uPackage').innerText = '首次评估';
    } else {
        document.getElementById('uRemainLabel').innerText = '剩余课时';
        document.getElementById('uPackage').innerText = `套餐${userProfile.package_type}`;
    }
}

function switchMainTab(tab) {
    const isBooking = tab === 'booking';
    document.getElementById('bookingPanel').classList.toggle('hidden', !isBooking);
    document.getElementById('historyPanel').classList.toggle('hidden', isBooking);
    document.getElementById('tabBooking').className = `flex-1 py-3 text-center transition ${isBooking ? 'tab-active' : 'text-gray-500'}`;
    document.getElementById('tabHistory').className = `flex-1 py-3 text-center transition ${!isBooking ? 'tab-active' : 'text-gray-500'}`;
    if (!isBooking) loadHistory();
}

// ===== 日期选择 =====
function initDatePicker() {
    const container = document.getElementById('datePicker');
    container.innerHTML = '';
    const today = new Date();
    for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const dateStr = d.toISOString().split('T')[0];
        const btn = document.createElement('button');
        btn.className = `flex-shrink-0 w-14 h-18 rounded-xl flex flex-col items-center justify-center p-2 transition border-2 ${i===0?'border-indigo-500 bg-indigo-50 text-indigo-700':'border-transparent bg-gray-50 text-gray-700'}`;
        btn.innerHTML = `<span class="text-xs text-gray-400">${i===0?'今天':['日','一','二','三','四','五','六'][d.getDay()]}</span><span class="text-lg font-bold">${d.getDate()}</span><span class="text-xs">${d.getMonth()+1}月</span>`;
        btn.onclick = () => selectDate(dateStr, btn);
        container.appendChild(btn);
        if (i === 0) selectDate(dateStr, btn);
    }
}

async function selectDate(dateStr, btnEl) {
    document.querySelectorAll('#datePicker button').forEach(b => {
        b.className = 'flex-shrink-0 w-14 h-18 rounded-xl flex flex-col items-center justify-center p-2 transition border-2 border-transparent bg-gray-50 text-gray-700';
    });
    btnEl.className = 'flex-shrink-0 w-14 h-18 rounded-xl flex flex-col items-center justify-center p-2 transition border-2 border-indigo-500 bg-indigo-50 text-indigo-700';
    selectedDate = dateStr;
    selectedSlots = [];
    updateConfirmBtn();
    await loadSlots(dateStr);
}

// ===== 时段加载 =====
async function loadSlots(dateStr) {
    const container = document.getElementById('slotContainer');
    container.innerHTML = '<div class="col-span-4 text-center py-4 text-gray-400">加载中...</div>';

    // 查询当天所有已占用时段（含两格）
    const { data } = await supabaseClient
        .from('appointments')
        .select('time_slot')
        .eq('appointment_date', dateStr)
        .neq('status', 'cancelled');

    bookedSet = new Set();
    if (data) data.forEach(a => {
        // time_slot 格式：'11:00' 或 '11:00+11:30'（老用户两格）
        a.time_slot.split('+').forEach(s => bookedSet.add(s.trim()));
    });

    const nowHour = new Date().getHours();
    const nowMin = new Date().getMinutes();
    const isToday = dateStr === new Date().toISOString().split('T')[0];
    const isNew = isNewUser(userProfile);

    // 提示语
    document.getElementById('slotHint').innerText = isNew ? '评估课：选1格（30分钟）' : '疗程课：点选开始时间，自动预约连续1小时';

    container.innerHTML = '';
    ALL_SLOTS.forEach(slot => {
        const [h, m] = slot.split(':').map(Number);
        const isPast = isToday && (h < nowHour || (h === nowHour && m <= nowMin));
        const isBooked = bookedSet.has(slot);

        const btn = document.createElement('button');
        btn.dataset.slot = slot;
        btn.className = 'py-2 rounded-lg text-xs font-medium transition ';

        if (isPast || isBooked) {
            btn.className += isPast ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'slot-booked';
            btn.disabled = true;
            btn.innerText = slot;
        } else {
            btn.className += 'slot-free hover:opacity-90 active:scale-95';
            btn.innerText = slot;
            btn.onclick = () => selectSlot(slot, btn);
        }
        container.appendChild(btn);
    });
}

// ===== 时段选择逻辑 =====
function selectSlot(slot, btnEl) {
    const isNew = isNewUser(userProfile);

    if (isNew) {
        // 新用户：只能选1格
        clearSlotSelection();
        selectedSlots = [slot];
        btnEl.className = 'py-2 rounded-lg text-xs font-medium transition slot-sel-1';
    } else {
        // 老用户：点第一格后自动选中下一格
        clearSlotSelection();
        const firstIdx = ALL_SLOTS.indexOf(slot);
        const nextSlot = ALL_SLOTS[firstIdx + 1];

        if (!nextSlot) {
            showToast('该时段无法预约（没有连续下一格）');
            return;
        }
        if (bookedSet.has(nextSlot)) {
            showToast('连续时段已被占用，请选其他时间');
            return;
        }

        selectedSlots = [slot, nextSlot];

        // 高亮两格
        document.querySelectorAll('#slotContainer button').forEach(b => {
            if (b.dataset.slot === slot) b.className = 'py-2 rounded-lg text-xs font-medium transition slot-sel-1';
            if (b.dataset.slot === nextSlot) b.className = 'py-2 rounded-lg text-xs font-medium transition slot-sel-2';
        });
    }
    updateConfirmBtn();
}

function clearSlotSelection() {
    document.querySelectorAll('#slotContainer button').forEach(b => {
        if (!b.disabled && (b.classList.contains('slot-sel-1') || b.classList.contains('slot-sel-2'))) {
            b.className = 'py-2 rounded-lg text-xs font-medium transition slot-free hover:opacity-90 active:scale-95';
        }
    });
}

function updateConfirmBtn() {
    const btn = document.getElementById('confirmBtn');
    const info = document.getElementById('selectedInfo');
    const isNew = isNewUser(userProfile);
    const ready = isNew ? selectedSlots.length === 1 : selectedSlots.length === 2;

    if (ready) {
        const timeStr = isNew
            ? `${selectedSlots[0]} - ${nextSlotTime(selectedSlots[0])}`
            : `${selectedSlots[0]} - ${nextSlotTime(selectedSlots[1])}`;
        info.classList.remove('hidden');
        info.innerHTML = `✅ 已选：<b>${timeStr}</b>（${isNew ? '30' : '60'}分钟）`;
        btn.disabled = false;
        btn.className = 'w-full mt-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold shadow-lg transition cursor-pointer';
        btn.innerText = `确认预约 ${timeStr}`;
    } else {
        info.classList.add('hidden');
        btn.disabled = true;
        btn.className = 'w-full mt-4 py-3 bg-gray-300 text-gray-500 rounded-xl font-bold transition cursor-not-allowed';
        btn.innerText = isNew ? '请选择1个时段' : '请选择连续2个时段';
    }
}

function nextSlotTime(slot) {
    const idx = ALL_SLOTS.indexOf(slot);
    if (idx < 0) return slot;
    // 返回该时段结束时间（下一个格的开始时间）
    const [h, m] = slot.split(':').map(Number);
    const totalMin = h * 60 + m + 30;
    return `${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
}

// ===== 提交预约 =====
async function submitBooking() {
    if (!selectedDate || selectedSlots.length === 0 || !userProfile) return;
    if (userProfile.remaining_sessions <= 0) { showToast('课时不足，请联系工作人员'); return; }

    const isNew = isNewUser(userProfile);
    if (!isNew && selectedSlots.length < 2) { showToast('请选择连续两个时段'); return; }

    // 生成 time_slot 字段
    const timeSlotStr = selectedSlots.join('+');
    // 显示时间范围
    const displayTime = isNew
        ? `${selectedSlots[0]}-${nextSlotTime(selectedSlots[0])}`
        : `${selectedSlots[0]}-${nextSlotTime(selectedSlots[1])}`;

    if (!confirm(`确认预约 ${selectedDate} ${displayTime}？`)) return;

    // 疗程用户：检查是否有未完成的预约
    if (!isNew) {
        const now = new Date();
        const { data: pending } = await supabaseClient
            .from('appointments')
            .select('appointment_date, time_slot')
            .eq('user_id', userProfile.id)
            .eq('status', 'pending');
        if (pending && pending.length > 0) {
            // 检查是否有还未结束的预约
            const hasUnfinished = pending.some(apt => {
                const slots = apt.time_slot.split('+').map(s => s.trim());
                const endSlot = slots[slots.length - 1];
                const [h, m] = endSlot.split(':').map(Number);
                const total = h * 60 + m + 30;
                const endTime = new Date(`${apt.appointment_date} ${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}:00`);
                return now < endTime;
            });
            if (hasUnfinished) {
                showToast('您有未完成的课程，请完成后再预约');
                return;
            }
        }
    }

    // 生成 session_index
    const pkgType = userProfile.package_type;
    const usedIndices = userProfile.used_session_indices || [];
    const totalSessions = userProfile.total_sessions;
    let nextIndex = 1;
    for (let i = 1; i <= totalSessions + 10; i++) {
        if (!usedIndices.includes(`${pkgType}${i}`)) { nextIndex = i; break; }
    }
    const sessionIndexStr = `${pkgType}${nextIndex}`;

    showLoading('confirmBtn', true, '提交中...');
    try {
        // 检查时段是否被占用（防并发）
        for (const s of selectedSlots) {
            if (bookedSet.has(s)) throw new Error('手慢了，该时段已被预约');
        }

        const { error: insErr } = await supabaseClient.from('appointments').insert({
            user_id: userProfile.id,
            user_name: userProfile.name,
            user_phone: userProfile.phone,
            appointment_date: selectedDate,
            time_slot: timeSlotStr,
            status: 'pending',
            package_type: pkgType,
            session_index: sessionIndexStr
        });
        if (insErr) {
            if (insErr.code === '23505') throw new Error('手慢了，该时段已被预约');
            throw insErr;
        }

        // 扣次数
        const newRemaining = userProfile.remaining_sessions - 1;
        const newUsed = [...usedIndices, sessionIndexStr];
        await supabaseClient.from('users').update({
            remaining_sessions: newRemaining,
            used_session_indices: newUsed
        }).eq('id', userProfile.id);

        userProfile.remaining_sessions = newRemaining;
        userProfile.used_session_indices = newUsed;
        renderUserInfo();
        selectedSlots = [];
        showToast('预约成功！');
        await loadSlots(selectedDate);
        updateConfirmBtn();

    } catch(e) {
        showToast(e.message || '预约失败');
    } finally {
        showLoading('confirmBtn', false);
    }
}

// ===== 历史记录 =====
async function loadHistory() {
    if (!userProfile) return;
    const { data } = await supabaseClient
        .from('appointments').select('*')
        .eq('user_id', userProfile.id)
        .order('appointment_date', { ascending: false });

    const container = document.getElementById('historyList');
    const empty = document.getElementById('emptyHistory');
    container.innerHTML = '';
    if (!data || data.length === 0) { empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');

    const now = new Date();
    data.forEach(apt => {
        const slots = apt.time_slot.split('+');
        const startSlot = slots[0].trim();
        const endSlot = slots[slots.length - 1].trim();
        const displayTime = `${startSlot}-${nextSlotTime(endSlot)}`;

        const slotStart = new Date(`${apt.appointment_date} ${startSlot}:00`);
        const slotEnd = new Date(`${apt.appointment_date} ${nextSlotTime(endSlot)}:00`);
        const isOngoing = apt.status === 'pending' && now >= slotStart && now < slotEnd;
        const isAutoDone = apt.status === 'pending' && now >= slotEnd;

        let badge, badgeColor;
        if (isOngoing) { badge = '🟢 进行中'; badgeColor = 'bg-yellow-100 text-yellow-700'; }
        else if (isAutoDone || apt.status === 'completed') { badge = '已完成'; badgeColor = 'bg-green-100 text-green-700'; }
        else if (apt.status === 'cancelled') { badge = '已取消'; badgeColor = 'bg-gray-100 text-gray-500'; }
        else { badge = '待履约'; badgeColor = 'bg-blue-100 text-blue-700'; }

        const canCancel = apt.status === 'pending' && !isOngoing && !isAutoDone
            && ((new Date(`${apt.appointment_date} ${startSlot}:00`) - now) / 3600000 >= CONFIG.CANCEL_MIN_HOURS);

        const div = document.createElement('div');
        div.className = 'bg-white p-4 rounded-xl shadow-sm';
        div.innerHTML = `
            <div class="flex justify-between items-start mb-2">
                <div>
                    <span class="font-bold text-gray-800">${apt.appointment_date}</span>
                    <span class="text-gray-500 ml-2 text-sm">${displayTime}</span>
                </div>
                <span class="text-xs px-2 py-1 rounded-full ${badgeColor}">${badge}</span>
            </div>
            <div class="flex justify-between items-center text-sm text-gray-600">
                <span class="bg-purple-50 text-purple-600 px-2 py-0.5 rounded border border-purple-100">${apt.session_index}</span>
                ${canCancel ? `<button onclick="cancelAppointment('${apt.id}','${apt.appointment_date}','${apt.time_slot}')" class="text-red-500 hover:text-red-700 font-medium">取消预约</button>` : ''}
            </div>`;
        container.appendChild(div);
    });
}

// ===== 取消预约 =====
async function cancelAppointment(id, date, timeSlot) {
    const countEl = document.getElementById('uCancelUsed');
    if (parseInt(countEl.innerText) >= CONFIG.MONTHLY_CANCEL_LIMIT) { showToast('本月取消次数已达上限'); return; }
    if (!confirm('确定要取消？次数将返还。')) return;

    try {
        const { data: aptData } = await supabaseClient.from('appointments').select('session_index').eq('id', id).single();
        await supabaseClient.from('appointments').update({ status: 'cancelled' }).eq('id', id);

        const newRemaining = userProfile.remaining_sessions + 1;
        const newUsed = (userProfile.used_session_indices || []).filter(i => i !== aptData.session_index);
        await supabaseClient.from('users').update({ remaining_sessions: newRemaining, used_session_indices: newUsed }).eq('id', userProfile.id);

        const now = new Date();
        const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        await supabaseClient.from('operation_logs').insert({ user_id: userProfile.id, operation_type: 'cancel', year_month: ym });

        userProfile.remaining_sessions = newRemaining;
        userProfile.used_session_indices = newUsed;
        renderUserInfo();
        showToast('已取消，次数已返还');
        loadHistory();
        loadCancelCount();
        if (selectedDate === date) loadSlots(selectedDate);
    } catch(e) {
        showToast('取消失败');
    }
}

async function loadCancelCount() {
    const now = new Date();
    const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const { count } = await supabaseClient.from('operation_logs')
        .select('*', { count: 'exact', head: true })
        .eq('user_id', userProfile.id).eq('year_month', ym).eq('operation_type', 'cancel');
    document.getElementById('uCancelUsed').innerText = count || 0;
}
